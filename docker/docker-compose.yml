version: '3.8'
services:
  ruoyi-nacos:
    container_name: ruoyi-nacos
    image: nacos/nacos-server:v2.4.2
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=ruoyi-mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=ry_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=password
      - MYSQL_SERVICE_DB_PARAM=allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - ruoyi-mysql
    restart: unless-stopped
    networks:
      - app-net

  ruoyi-mysql:
    container_name: ruoyi-mysql
    image: mysql:8.4.8
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--log-bin=mysql-bin',
      '--binlog_format=ROW',
      '--server-id=1',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1',
      '--max_connect_errors=1000',
      '--max_connections=500'
    ]
    environment:
      MYSQL_DATABASE: 'ry-cloud'
      MYSQL_ROOT_PASSWORD: 'password'
    restart: unless-stopped
    networks:
      - app-net

  ruoyi-canal:
    image: canal/canal-server:v1.1.8
    container_name: ruoyi-canal
    ports:
      - "11111:11111"
    environment:
      - canal.instance.master.address=ruoyi-mysql:3306
      - canal.instance.dbUsername=root
      - canal.instance.dbPassword=password
      - canal.instance.connectionCharset=UTF-8
      - canal.instance.filter.regex=ry-cloud\\.sys_notice
    depends_on:
      - ruoyi-mysql
    restart: unless-stopped
    networks:
      - app-net

  ruoyi-redis:
    container_name: ruoyi-redis
    image: redis:v8.6.2
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/ruoyi/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/ruoyi/redis/redis.conf
    restart: unless-stopped

  ruoyi-nginx:
    container_name: ruoyi-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/ruoyi/projects/ruoyi-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - ruoyi-gateway
    restart: unless-stopped

  ruoyi-gateway:
    container_name: ruoyi-gateway
    build:
      context: ./ruoyi/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ruoyi-redis
      - ruoyi-nacos
    restart: unless-stopped

  ruoyi-auth:
    container_name: ruoyi-auth
    build:
      context: ./ruoyi/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - ruoyi-redis
      - ruoyi-nacos
    restart: unless-stopped

  ruoyi-modules-system:
    container_name: ruoyi-modules-system
    build:
      context: ./ruoyi/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - ruoyi-redis
      - ruoyi-mysql
      - ruoyi-nacos
      - ruoyi-canal
    networks:
      - app-net
    restart: unless-stopped

  ruoyi-modules-vehicle:
    container_name: ruoyi-modules-vehicle
    build:
      context: ./ruoyi/modules/vehicle
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - ruoyi-redis
      - ruoyi-mysql
      - ruoyi-nacos
    restart: unless-stopped

  ruoyi-modules-job:
    container_name: ruoyi-modules-job
    build:
      context: ./ruoyi/modules/job
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    depends_on:
      - ruoyi-mysql
      - ruoyi-nacos
    restart: unless-stopped

  ruoyi-modules-file:
    container_name: ruoyi-modules-file
    build:
      context: ./ruoyi/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
      - ./ruoyi/uploadPath:/home/ruoyi/uploadPath
    restart: unless-stopped

  ruoyi-visual-monitor:
    container_name: ruoyi-visual-monitor
    build:
      context: ./ruoyi/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
    depends_on:
      - ruoyi-nacos
    restart: unless-stopped

  ruoyi-visual-vehicle:
    container_name: ruoyi-visual-vehicle
    build:
      context: ./ruoyi/visual/vehicle
      dockerfile: dockerfile
    ports:
      - "9100:9100"
    depends_on:
      - ruoyi-redis
      - ruoyi-mysql
      - ruoyi-nacos
    restart: unless-stopped

networks:
  app-net:
    driver: bridge